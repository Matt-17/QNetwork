name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Publish release artifacts
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Resolve version from tag
        id: resolve_version
        shell: pwsh
        run: |
          if (-not "${{ github.ref_name }}".StartsWith("v")) {
            Write-Error "Tag must start with 'v'."
            exit 1
          }
          $version = "${{ github.ref_name }}".Substring(1)
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            Write-Error "Tag must be in the form vX.Y.Z. Found '${version}'."
            exit 1
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore QNetwork.slnx

      - name: Build
        run: dotnet build QNetwork.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test QNetwork.slnx --configuration Release --no-build

      - name: Build and publish win-x64 app
        run: >
          dotnet publish QNetwork/QNetwork.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishReadyToRun=false
          -p:ProductVersion=${{ steps.resolve_version.outputs.version }}
          --output artifacts/publish/QNetwork/Release/win-x64

      - name: Build MSI
        run: dotnet build QNetwork.Installer/QNetwork.Installer.wixproj --configuration Release -p:ProductVersion=${{ steps.resolve_version.outputs.version }}

      - name: Collect MSI path
        id: collect_msi
        shell: pwsh
        run: |
          $msi = "QNetwork.Installer/bin/x64/Release/QNetwork-${{ steps.resolve_version.outputs.version }}-x64.msi"
          if (-not (Test-Path $msi)) {
            throw "Missing MSI at $msi"
          }
          echo "path=$msi" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: ${{ steps.collect_msi.outputs.path }}

      - name: Submit or update Winget package
        if: ${{ secrets.WINGET_TOKEN != '' }}
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: Code-iX.QNetwork
          installers-regex: '^QNetwork-\d+\.\d+\.\d+-x64\.msi$'
          release-tag: ${{ github.ref_name }}
          package-version: ${{ steps.resolve_version.outputs.version }}
          token: ${{ secrets.WINGET_TOKEN }}
